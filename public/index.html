<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Sonic — Voice Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        #mic-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #333;
            background: #1a1a2e;
            color: #667eea;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            position: relative;
        }

        #mic-btn:hover {
            border-color: #667eea;
        }

        #mic-btn.active {
            border-color: #e74c3c;
            color: #e74c3c;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(231, 76, 60, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
            }
        }

        #status {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 1.5rem;
            min-height: 1.4em;
        }

        #transcript {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 1.5rem;
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
            border: 1px solid #2a2a3e;
        }

        #transcript:empty::before {
            content: "Transcript will appear here...";
            color: #555;
            font-style: italic;
        }

        .msg {
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .msg.user {
            color: #667eea;
        }

        .msg.assistant {
            color: #a0d995;
        }

        .msg .label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.7;
            display: block;
            margin-bottom: 2px;
        }

        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            height: 40px;
            margin-bottom: 1rem;
        }

        .visualizer .bar {
            width: 4px;
            background: #667eea;
            border-radius: 2px;
            transition: height 0.1s ease;
            height: 4px;
        }

        #mic-btn.active~.visualizer .bar {
            animation: barAnim 0.5s ease-in-out infinite alternate;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Nova Sonic</h1>
        <p class="subtitle">Audio-to-audio conversation powered by Amazon Nova Sonic</p>

        <button id="mic-btn" aria-label="Toggle microphone">🎙️</button>

        <div class="visualizer" id="visualizer"></div>

        <p id="status">Click the mic to start talking</p>

        <div id="transcript" role="log" aria-live="polite"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
