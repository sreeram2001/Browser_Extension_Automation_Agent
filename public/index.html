<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic — Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0c0c14;
            color: #d8dae5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 920px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 0.4rem;
            font-size: 0.88rem;
        }

        .wake-word-hint {
            color: #a78bfa;
            font-size: 0.82rem;
            margin-bottom: 2rem;
            opacity: 0.75;
        }

        #mic-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #23233a;
            background: radial-gradient(circle at 40% 40%, #1e1e32, #13131f);
            color: #a78bfa;
            font-size: 2.4rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.8rem;
        }

        #mic-btn:hover {
            border-color: #a78bfa;
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.15);
        }

        #mic-btn.listening {
            border-color: #60a5fa;
            color: #60a5fa;
            animation: breathe 3s ease-in-out infinite;
        }

        #mic-btn.active {
            border-color: #f472b6;
            color: #f472b6;
            animation: pulse 1.5s infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.25);
            }

            50% {
                box-shadow: 0 0 0 16px rgba(96, 165, 250, 0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4);
            }

            70% {
                box-shadow: 0 0 0 22px rgba(244, 114, 182, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(244, 114, 182, 0);
            }
        }

        #status {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 1.2rem;
            min-height: 1.4em;
        }

        #transcript {
            background: #111119;
            border-radius: 14px;
            padding: 1.4rem;
            max-height: 420px;
            overflow-y: auto;
            text-align: left;
            border: 1px solid #1e1e30;
            scrollbar-width: thin;
            scrollbar-color: #2a2a40 transparent;
        }

        #transcript::-webkit-scrollbar {
            width: 6px;
        }

        #transcript::-webkit-scrollbar-track {
            background: transparent;
        }

        #transcript::-webkit-scrollbar-thumb {
            background: #2a2a40;
            border-radius: 3px;
        }

        #transcript:empty::before {
            content: "Transcript will appear here...";
            color: #3a3a50;
            font-style: italic;
        }

        .msg {
            margin-bottom: 0.7rem;
            line-height: 1.55;
            font-size: 0.9rem;
        }

        .msg.user {
            color: #60a5fa;
        }

        .msg.assistant {
            color: #d8dae5;
        }

        .msg.system {
            color: #a78bfa;
            font-style: italic;
            font-size: 0.82rem;
        }

        .msg .label {
            font-weight: 600;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.65;
            display: block;
            margin-bottom: 4px;
        }

        /* Search results card */
        .msg.search-results {
            background: rgba(167, 139, 250, 0.06);
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            border-left: 3px solid #a78bfa;
        }

        .citations {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .citation-link {
            color: #c4b5fd;
            text-decoration: none;
            font-size: 0.75rem;
            background: rgba(167, 139, 250, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .citation-link:hover {
            background: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
        }

        /* Zoom / meeting cards */
        .msg.zoom-meeting {
            background: rgba(96, 165, 250, 0.06);
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            border-left: 3px solid #60a5fa;
        }

        .zoom-topic {
            font-size: 0.9rem;
            margin: 4px 0;
            color: #e0e2eb;
        }

        .zoom-link {
            display: inline-block;
            color: #fff;
            background: linear-gradient(135deg, #6366f1, #60a5fa);
            text-decoration: none;
            font-size: 0.82rem;
            padding: 5px 14px;
            border-radius: 6px;
            margin-top: 6px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .zoom-link:hover {
            opacity: 0.85;
        }

        .zoom-passcode {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 4px;
        }

        .zoom-error {
            color: #fb7185;
            font-size: 0.82rem;
        }

        /* Calendar events card */
        .msg.calendar-events {
            background: rgba(52, 211, 153, 0.06);
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            border-left: 3px solid #34d399;
        }

        .calendar-event-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .calendar-event-item:last-child {
            border-bottom: none;
        }

        .calendar-event-time {
            flex-shrink: 0;
            font-size: 0.76rem;
            color: #34d399;
            font-weight: 600;
            min-width: 60px;
            padding-top: 2px;
            font-variant-numeric: tabular-nums;
        }

        .calendar-event-details {
            flex: 1;
            min-width: 0;
        }

        .calendar-event-title {
            font-size: 0.88rem;
            color: #e0e2eb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .calendar-event-meta {
            font-size: 0.72rem;
            color: #6b7280;
            margin-top: 2px;
        }

        .calendar-event-meet {
            display: inline-block;
            font-size: 0.7rem;
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
            padding: 2px 8px;
            border-radius: 20px;
            text-decoration: none;
            margin-top: 4px;
            transition: all 0.2s;
        }

        .calendar-event-meet:hover {
            background: rgba(96, 165, 250, 0.2);
        }

        .calendar-empty {
            color: #6b7280;
            font-size: 0.82rem;
            padding: 4px 0;
        }

        /* Calendar event added card */
        .msg.calendar-added {
            background: rgba(52, 211, 153, 0.06);
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            border-left: 3px solid #34d399;
        }

        /* Visualizer */
        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 40px;
            margin-bottom: 1rem;
        }

        .visualizer .bar {
            width: 3px;
            background: linear-gradient(180deg, #a78bfa, #60a5fa);
            border-radius: 2px;
            transition: height 0.08s ease;
            height: 3px;
        }

        /* Enable button */
        #enable-btn {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            color: #fff;
            cursor: pointer;
            margin-bottom: 2rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.25);
        }

        #enable-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(99, 102, 241, 0.35);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>SONIC</h1>
        <p class="subtitle">Voice Assistant</p>
        <p class="wake-word-hint">Say "Sonic" to start, or click the mic</p>

        <button id="enable-btn" aria-label="Enable voice assistant">🔊 Enable Voice Assistant</button>

        <button id="mic-btn" aria-label="Toggle microphone" style="display:none;">🎙️</button>

        <div class="visualizer" id="visualizer"></div>

        <p id="status">Click the button above to enable the voice assistant</p>

        <div id="transcript" role="log" aria-live="polite"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
